name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Get dependencies
        run: flutter pub get
        working-directory: trabajo

      - name: Build APK
        run: flutter build apk --release
        working-directory: trabajo

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: trabajo/build/app/outputs/flutter-apk/*.apk
